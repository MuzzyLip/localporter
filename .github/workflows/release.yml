name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to package and release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      version: ${{ steps.release_meta.outputs.version }}
      release_notes_path: ${{ steps.release_meta.outputs.release_notes_path }}
      checkout_ref: ${{ steps.release_meta.outputs.checkout_ref }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Validate tag, version, and release notes
        id: release_meta
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "$TAG_NAME" ]]; then
            echo "Release tag is empty." >&2
            exit 1
          fi

          if [[ "$TAG_NAME" != v* ]]; then
            echo "Release tag must start with 'v': $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          BASE_VERSION="${VERSION%%-*}"
          RELEASE_NOTES_PATH="release-notes/${TAG_NAME}.md"
          WORKSPACE_VERSION="$(
            awk '
              /^\[workspace\.package\]/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"

          if [[ -z "$WORKSPACE_VERSION" ]]; then
            echo "Failed to resolve workspace version from Cargo.toml." >&2
            exit 1
          fi

          if [[ "$BASE_VERSION" != "$WORKSPACE_VERSION" ]]; then
            echo "Tag base version '$BASE_VERSION' does not match workspace version '$WORKSPACE_VERSION'." >&2
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$VERSION" != "$WORKSPACE_VERSION" ]]; then
            IS_PRERELEASE=true
          fi

          if [[ ! -f "$RELEASE_NOTES_PATH" ]]; then
            echo "Missing release notes file: $RELEASE_NOTES_PATH" >&2
            exit 1
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "version=$VERSION"
            echo "release_notes_path=$RELEASE_NOTES_PATH"
            echo "checkout_ref=$TAG_NAME"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS DMG
    needs: prepare
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build universal macOS DMG
        env:
          LOCALPORTER_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: ./scripts/build-macos-dmg.sh

      - name: Show macOS bundle outputs
        run: find target/universal-apple-darwin/bundle -maxdepth 3 -type f | sort

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/universal-apple-darwin/bundle/dmg/LocalPorter-${{ needs.prepare.outputs.version }}-macos-universal.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows ZIP and MSI
    needs: prepare
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install WiX CLI
        shell: pwsh
        run: |
          if (Get-Command wix -ErrorAction SilentlyContinue) {
            dotnet tool update --global wix --version "4.*"
          }
          else {
            dotnet tool install --global wix --version "4.*"
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows release artifacts
        shell: pwsh
        env:
          LOCALPORTER_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: ./scripts/build-windows-release.ps1

      - name: Show Windows bundle outputs
        shell: pwsh
        run: Get-ChildItem -Path "target\x86_64-pc-windows-msvc\release\bundle" -Recurse -File | Select-Object -ExpandProperty FullName

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: target/x86_64-pc-windows-msvc/release/bundle/windows/LocalPorter-${{ needs.prepare.outputs.version }}-windows-x64.zip
          if-no-files-found: error

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/x86_64-pc-windows-msvc/release/bundle/windows/LocalPorter-${{ needs.prepare.outputs.version }}-windows-x64.msi
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos

      - name: Download Windows ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist/windows

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/windows

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: LocalPorter ${{ needs.prepare.outputs.tag_name }}
          body_path: ${{ needs.prepare.outputs.release_notes_path }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            dist/macos/LocalPorter-${{ needs.prepare.outputs.version }}-macos-universal.dmg
            dist/windows/LocalPorter-${{ needs.prepare.outputs.version }}-windows-x64.zip
            dist/windows/LocalPorter-${{ needs.prepare.outputs.version }}-windows-x64.msi
          fail_on_unmatched_files: true
